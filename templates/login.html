{% extends 'base.html' %}

{% block title %}Login - House Price Prediction{% endblock %}

{% block content %}
<div class="auth-container fade-in-up">
    <div class="auth-card glass">
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to access your dashboard.</p>

        <form method="POST" action="">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary btn-block">Log In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a></p>
        </div>
    </div>
</div>
{% endblock %}
