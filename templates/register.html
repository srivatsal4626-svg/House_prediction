{% extends 'base.html' %}

{% block title %}Register - House Price Prediction{% endblock %}

{% block content %}
<div class="auth-container fade-in-up">
    <div class="auth-card glass">
        <h2>Create an Account</h2>
        <p class="subtitle">Join us to start predicting house prices.</p>

        <form method="POST" action="">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary btn-block">Sign Up</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Log in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
